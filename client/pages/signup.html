<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — XMart</title>
    <link rel="stylesheet" href="/client/css/global.css">
    <link rel="stylesheet" href="/client/css/signup.css">
</head>

<body>
    <div class="page-wrapper">
        <form id="signupForm">
            <h2>Create Account</h2>

            <label for="fname">First Name</label>
            <input type="text" id="fname" name="fname" placeholder="Enter First Name" required />

            <label for="mname">Middle Name</label>
            <input type="text" id="mname" name="mname" placeholder="Enter Middle Name" />

            <label for="lname">Last Name</label>
            <input type="text" id="lname" name="lname" placeholder="Enter Last Name" required />

            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter Username" required />

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter Email" required />

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter Password" required />

            <label for="confirmpassword">Confirm Password</label>
            <input type="password" id="confirmpassword" name="confirmpassword" placeholder="Enter Password Again"
                required />

            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" />

            <button type="submit">Sign Up</button>

            <p>Already have an account? <a href="/client/pages/login.html">Login</a></p>
        </form>
    </div>
</body>

</html>
