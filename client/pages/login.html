<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login XMart</title>
    <link rel="stylesheet" href="/client/css/global.css">
    <link rel="stylesheet" href="/client/css/login.css">
</head>

<body>
    <div class="page-wrapper">
        <form class="login-box">
            <h1>Welcome Back</h1>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="abc@email.com" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="password123" required>
            <button type="submit">Login</button>
            <p>Don't have an account? <a href="/client/pages/signup.html">Sign Up</a></p>
        </form>
    </div>
</body>

</html>
